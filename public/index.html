<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>HPTI人格测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1e1a29;
            background-image: radial-gradient(circle at 20% 10%, #332b40 0%, transparent 35%),
                radial-gradient(circle at 80% 90%, #2d2740 0%, transparent 40%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
            padding: 16px;
            color: #e8e0f0;
        }
        .container {
            width: 100%;
            max-width: 620px;
            background: rgba(30, 25, 40, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 32px 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 215, 150, 0.2);
            border: 1px solid rgba(255, 210, 130, 0.2);
            transition: all 0.2s ease;
        }
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        .header .emoji {
            font-size: 48px;
            display: block;
            margin-bottom: 6px;
            filter: drop-shadow(0 0 8px #daa06a);
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #f9d390, #e6a4b4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }
        .subtitle {
            color: #bcacc4;
            font-size: 13px;
            letter-spacing: 2px;
            margin-top: 4px;
        }
        .progress-wrap {
            margin: 10px 0 20px;
        }
        .progress-bar {
            height: 6px;
            background: #3b3448;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #e6b87a, #c97bbf);
            border-radius: 10px;
            transition: width 0.4s ease;
        }
        .progress-num {
            text-align: right;
            font-size: 12px;
            color: #9b8eaa;
            margin-top: 6px;
        }
        .question-card {
            background: rgba(45, 35, 55, 0.7);
            border-radius: 20px;
            padding: 20px 18px;
            margin-bottom: 16px;
            border: 1px solid rgba(215, 185, 140, 0.25);
            animation: fadeUp 0.35s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .q-text {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 14px;
            color: #f1e5ff;
            line-height: 1.5;
            word-break: break-word;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .opt-btn {
            background: rgba(60, 45, 75, 0.8);
            border: 1.5px solid rgba(190, 150, 130, 0.5);
            border-radius: 14px;
            padding: 12px 14px;
            color: #e3d7f0;
            font-size: 14px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            backdrop-filter: blur(4px);
            -webkit-tap-highlight-color: transparent;
            word-break: break-word;
            overflow-wrap: break-word;
            line-height: 1.5;
        }
        .opt-btn:hover {
            border-color: #dba970;
            background: rgba(80, 55, 95, 0.7);
            transform: translateY(-1px);
        }
        .opt-btn.selected {
            background: rgba(200, 140, 80, 0.25);
            border-color: #e6b87a;
            box-shadow: 0 0 14px rgba(230, 170, 100, 0.3);
            color: #ffe5c4;
            font-weight: 600;
        }
        .opt-btn.opt-mid {
            border-style: dashed;
            opacity: 0.8;
        }
        .opt-letter {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255, 215, 150, 0.2);
            font-weight: bold;
            font-size: 12px;
            color: #f9d390;
            flex-shrink: 0;
            align-self: flex-start;
            margin-top: 1px;
        }
        .opt-btn.selected .opt-letter {
            background: #dba05a;
            color: #1e1826;
        }
        .opt-text {
            flex: 1;
            min-width: 0;
        }
        .opt-intensity {
            font-size: 10px;
            color: #9b8eaa;
            margin-left: 4px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .nav-btns {
            display: flex;
            justify-content: space-between;
            margin-top: 24px;
            gap: 12px;
        }
        .btn {
            padding: 12px 28px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            letter-spacing: 1px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .btn-primary {
            background: #dba05a;
            color: #1e1826;
            box-shadow: 0 4px 16px rgba(230, 160, 70, 0.4);
        }
        .btn-primary:hover { background: #e6b46c; transform: translateY(-2px); }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #9b8eaa;
            color: #ddd;
        }
        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: #c9b8d8;
        }
        .result-area {
            animation: fadeUp 0.5s ease;
        }
        .result-badge {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }
        .result-emoji { font-size: 70px; }
        .result-code {
            font-size: 44px;
            font-weight: 800;
            letter-spacing: 8px;
            background: linear-gradient(135deg, #f5c98e, #dd9ab0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 8px 0;
        }
        .result-name {
            font-size: 26px;
            font-weight: 700;
            color: #f3e0ff;
        }
        .rarity-badge {
            display: inline-block;
            margin-top: 8px;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .rarity-common { background: rgba(176,160,192,0.2); color: #b0a0c0; border: 1px solid rgba(176,160,192,0.4); }
        .rarity-rare { background: rgba(126,200,160,0.2); color: #7ec8a0; border: 1px solid rgba(126,200,160,0.4); }
        .rarity-epic { background: rgba(201,123,191,0.2); color: #c97bbf; border: 1px solid rgba(201,123,191,0.4); }
        .rarity-legendary {
            background: rgba(255,170,0,0.2);
            color: #ffaa00;
            border: 1px solid rgba(255,170,0,0.4);
            animation: glowPulse 2s ease-in-out infinite;
        }

        .rarity-desc-box {
            display: block;
            text-align: center;
            margin: 12px auto 20px auto;
            padding: 8px 15px;
            font-size: 13px;
            color: #dcc8a0;
            letter-spacing: 1px;
            line-height: 1.6;
            background: rgba(0,0,0,0.25);
            border-radius: 12px;
            border: 1px solid rgba(255,215,150,0.2);
            max-width: 90%;
            box-sizing: border-box;
        }
        .rarity-desc-box strong { color: #f9d390; font-size: 15px; }

        .match-section {
            background: rgba(45,32,55,0.8);
            border-radius: 16px;
            padding: 16px 20px;
            margin: 16px 0;
            border: 1px solid rgba(215,185,140,0.3);
            text-align: center;
        }
        .match-label { font-size: 12px; color: #9b8eaa; letter-spacing: 2px; margin-bottom: 8px; text-transform: uppercase; }
        .match-percent {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #f9d390, #e6b87a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 6px;
        }
        .match-percent.perfect {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glowPulse 1.5s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%,100% { filter: drop-shadow(0 0 6px rgba(255,170,0,0.5)); }
            50% { filter: drop-shadow(0 0 16px rgba(255,170,0,0.9)); }
        }
        .match-bar-outer { height: 8px; background: #3b3448; border-radius: 10px; overflow: hidden; margin: 8px auto; max-width: 300px; }
        .match-bar-inner { height: 100%; border-radius: 10px; transition: width 0.8s ease; background: linear-gradient(90deg, #dba05a, #f9d390); }
        .match-bar-inner.perfect { background: linear-gradient(90deg, #ffaa00, #ffd700); box-shadow: 0 0 12px rgba(255,170,0,0.5); }
        .match-detail { font-size: 12px; color: #b0a0c0; margin-top: 6px; letter-spacing: 1px; }
        .match-detail span { color: #f5d7b0; font-weight: 600; }
        .dim-match-row { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 10px; }
        .dim-dot {
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 700; letter-spacing: 1px; transition: all 0.3s;
        }
        .dim-dot.hit { background: rgba(219,160,90,0.35); color: #f9d390; border: 2px solid rgba(249,211,144,0.7); box-shadow: 0 0 8px rgba(219,160,90,0.3); }
        .dim-dot.miss { background: rgba(120,100,140,0.2); color: #7b6e8a; border: 2px solid rgba(150,130,160,0.3); }

        .result-desc {
            background: rgba(45,32,55,0.7);
            border-radius: 18px;
            padding: 20px;
            margin: 16px 0;
            border-left: 4px solid #dba05a;
            font-size: 14px;
            line-height: 1.7;
            color: #ddd;
            word-break: break-word;
        }
        .result-summary {
            background: rgba(60,45,75,0.6);
            border-radius: 14px;
            padding: 14px 16px;
            margin: 12px 0;
            font-size: 13px;
            color: #e5d7f5;
            line-height: 1.6;
            border: 1px dashed rgba(219,160,90,0.3);
        }
        .result-traits { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
        .trait-tag { background: rgba(220,165,100,0.2); color: #f5d7b0; padding: 6px 14px; border-radius: 20px; font-size: 13px; letter-spacing: 0.5px; }
        .share-box { background: #2c2338; border-radius: 16px; padding: 16px; margin-top: 20px; text-align: center; border: 1px dashed #6e5c78; }
        .share-text { background: transparent; border: none; color: #cdc0e0; width: 100%; font-size: 13px; resize: none; text-align: center; font-family: inherit; outline: none; word-break: break-word; }
        .copy-btn { margin-top: 10px; background: #453750; border: none; color: #f0e2ff; padding: 8px 24px; border-radius: 20px; cursor: pointer; transition: 0.2s; }
        .copy-btn:hover { background: #5d4b6e; }
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #dba05a; color: #1e1826; padding: 10px 24px;
            border-radius: 30px; font-weight: bold; z-index: 999;
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .toast.show { opacity: 1; }
        .admin-link {
            text-align: center; margin-top: 20px;
        }
        .admin-link a {
            color: #6e5c78; font-size: 12px; text-decoration: none;
            border: 1px solid rgba(110,92,120,0.3); border-radius: 16px;
            padding: 6px 16px; display: inline-block; transition: all .2s;
        }
        .admin-link a:hover { color: #9b8eaa; border-color: #9b8eaa; }
        .save-status {
            text-align: center; margin-top: 12px; font-size: 12px; color: #7ec8a0;
            opacity: 0; transition: opacity .3s;
        }
        .save-status.show { opacity: 1; }
        .save-status.error { color: #c75c5c; }
        .loading-screen {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: #1e1a29; display: flex; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity .4s;
        }
        .loading-screen.hide { opacity: 0; pointer-events: none; }
        .loading-screen .spinner {
            width: 48px; height: 48px; border: 4px solid rgba(219,160,90,0.2);
            border-top-color: #dba05a; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 450px) {
            .container { padding: 20px 14px; }
            .result-code { font-size: 32px; letter-spacing: 4px; }
            .match-percent { font-size: 38px; }
            .opt-btn { font-size: 13px; padding: 10px 12px; }
            .q-text { font-size: 14px; }
            .opt-letter { width: 24px; height: 24px; font-size: 10px; }
        }
    </style>
</head>
<body>
    <div class="loading-screen" id="loadingScreen"><div class="spinner"></div></div>
    <div class="container" id="app" style="visibility:hidden;">
        <div class="header">
            <span class="emoji">🔮🪞</span>
            <h1>HPTI人格测试</h1>
            <div class="subtitle">隐藏人格类型指标 · 36型隐秘人格</div>
        </div>
        <div class="progress-wrap">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-num" id="progressText">第 1/12 题</div>
        </div>
        <div id="questionContainer"></div>
        <div class="nav-btns" id="navButtons">
            <button class="btn btn-outline" id="prevBtn" onclick="prevQuestion()" style="display:none;">← 上一题</button>
        </div>
        <div id="resultContainer" class="result-area" style="display:none;"></div>
        <div class="save-status" id="saveStatus"></div>
        <div class="admin-link">
            <a href="admin.html">⚙ 管理后台</a>
        </div>
    </div>
    <div class="toast" id="toast">✅ 已复制</div>

    <script>
        // ===================== 后端 API 配置 =====================
        const API_BASE = ''; // 同源部署时留空，跨域部署时填后端地址如 'http://localhost:3000'

        // ===================== 默认题库 =====================
        const DEFAULT_QUESTIONS = [
            // 性开放 O vs 性压抑 R
            { dim: "sex", text: "面对浑身散发魅力的陌生人，你的自然反应是？", optA: "主动想象约会场景，甚至想立刻搭讪", optB: "会多注意几眼，但不会行动", optC: "无感，和平常一样", optD: "有点紧张，眼神回避", optE: "极度不安，想马上离开" },
            { dim: "sex", text: "关于私密幻想，你通常？", optA: "非常丰富，还乐于和朋友分享趣事", optB: "有，但仅限于自己知道", optC: "偶尔闪过，不太在意", optD: "很少，觉得浪费时间", optE: "几乎不，甚至感到羞耻" },
            { dim: "sex", text: "聚会中有人开尺度玩笑，你？", optA: "立刻加入，并抛出更劲爆的段子", optB: "跟着笑，觉得气氛不错", optC: "微笑不语，中立观望", optD: "低头刷手机，装作没听见", optE: "当场严肃制止，要求尊重" },
            { dim: "sex", text: "与闺蜜/兄弟聊到私密话题，你？", optA: "主动分享细节，开成研讨会", optB: "适度参与，不回避", optC: "看话题是否安全再决定", optD: "尽量岔开，转移话题", optE: "坚决不聊，这是我的禁区" },
            { dim: "sex", text: "看见情侣在公共场合热吻，你的感受？", optA: "真甜蜜，甚至想鼓掌叫好", optB: "正常，年轻人有激情", optC: "无感", optD: "有点尴尬，希望他们收敛", optE: "辣眼睛，有伤风化" },
            { dim: "sex", text: "下面哪种说法最符合你的观念？", optA: "欲望是生命力，越坦荡越快乐", optB: "适度表达有助于身心健康", optC: "因人而异，不好评判", optD: "最好藏在心里，不要外露", optE: "欲望带来麻烦，清心寡欲最佳" },

            // 外向 E vs 内向 I
            { dim: "social", text: "周五晚收到聚会邀请，你的反应？", optA: "秒回“马上到！”，并呼朋引伴", optB: "开心答应，准备参加", optC: "纠结一会儿，看心情", optD: "犹豫，需要做心理建设", optE: "找借口拒绝，宁愿宅家" },
            { dim: "social", text: "在一个满是陌生人的房间，你感觉？", optA: "兴奋，可以认识新朋友", optB: "自在，愿意主动聊天", optC: "先观察，再决定要不要社交", optD: "紧张，不知该说什么", optE: "想隐身，马上逃离" },
            { dim: "social", text: "公司团建活动，你通常？", optA: "自动成为气氛担当，组织游戏", optB: "积极参与，配合大家", optC: "随大流，不主动不拒绝", optD: "安静跟着，只在必要时发言", optE: "缩在角落，祈祷别关注我" },
            { dim: "social", text: "理想周末安排是？", optA: "约上一群朋友户外狂欢", optB: "和两三好友聚餐逛街", optC: "看心情，可能出门可能宅", optD: "大部分时间独处，偶尔见人", optE: "手机关机，与世隔绝" },
            { dim: "social", text: "在电梯里碰到半熟的人，你会？", optA: "热情打招呼，顺势聊几句", optB: "微笑点头问好", optC: "看对方反应再回应", optD: "假装看手机，避免交流", optE: "紧盯楼层数，祈祷快点到" },
            { dim: "social", text: "社交对你的意义是？", optA: "充电，越聊越精神", optB: "愉快的能量交换", optC: "生活的一部分，无好坏", optD: "消耗能量，需要控制", optE: "极度耗电，之后要独处回血" },

            // 情绪稳定 S vs 敏感 N
            { dim: "emotion", text: "被上司当众批评后，你？", optA: "冷静分析问题，五分钟翻篇", optB: "短暂不快，但很快调整", optC: "当时难受，半天恢复", optD: "持续低落，反复回想", optE: "表面平静，内心崩溃" },
            { dim: "emotion", text: "看了一部催泪电影，你通常？", optA: "感动但不影响情绪", optB: "略有感触，很快就淡了", optC: "当时哭了，过后忘记", optD: "情绪起伏大，需要几天平复", optE: "哭到停不下来，久久难以释怀" },
            { dim: "emotion", text: "有人说你“想太多”或“敏感”，你？", optA: "完全不在意，我自岿然不动", optB: "稍微反思，但不受影响", optC: "看说话人是谁，重要则改", optD: "感到受伤，开始自我怀疑", optE: "瞬间emo，陷入精神内耗" },
            { dim: "emotion", text: "原定计划突然改变，你？", optA: "毫无波澜，随机应变", optB: "稍作调整，适应良好", optC: "需要几分钟适应", optD: "烦躁但能接受", optE: "内心崩溃，表面还得微笑" },
            { dim: "emotion", text: "深夜独自一人时，你容易？", optA: "倒头秒睡，品质优良", optB: "平静入睡，偶尔思考", optC: "偶尔胡思乱想", optD: "反复复盘今天的失误", optE: "越想越清醒，焦虑失眠" },
            { dim: "emotion", text: "朋友玩笑开得过火，你？", optA: "当场怼回去或一笑了之", optB: "笑笑就过去了", optC: "有点介意但不说", optD: "表面笑，心里不舒服", optE: "表面笑，心里记小本本" },

            // 行动派 P vs 拖延 L

            { code: "OILNTC", name: "悄悄享乐主义者", emoji: "🍰", rarity: "common", desc: "内向谨慎，但私下非常懂得享受。你一个人吃大餐、看电影、旅行，快乐从不需要观众。", traits: ["独乐乐", "隐秘的放纵", "精致社恐", "自我宠溺"], summary: "开放+内向+敏感+拖延+感性+谨慎 = 隐蔽的快乐星球主。你精心经营着自己的小宇宙，外人只看到安静的表面。" },
            { code: "OILPTA", name: "浪子回头金不换", emoji: "🎸", rarity: "rare", desc: "随性内向，灵感来了谁也拦不住。你活得像一阵风，吹过就走，留下一地才华和没洗的袜子。", traits: ["浪子气质", "即兴创作", "拖延艺术家", "不羁生活"], summary: "开放+内向+稳定+拖延+理性+冒险 = 灵感型流浪者。你追逐内心的风，却常常忘记洗袜子和回消息。" },
            { code: "OISNTC", name: "人间观察员", emoji: "🦉", rarity: "common", desc: "内向稳重，静静观察世间万物。你有一双洞察一切的眼睛，和一张永远闭着的嘴。", traits: ["暗中观察", "沉默智者", "内心弹幕", "佛系点评"], summary: "开放+内向+稳定+行动派+感性+谨慎 = 社会实验记录者。你收集人间百态，但从不发表论文，只在自己心里存档。" },
            { code: "RILPT2", name: "摆烂但没完全摆", emoji: "🧩", rarity: "rare", desc: "你想躺平，但潜意识还在挣扎。每次说要放弃，身体却很诚实地继续努力，是矛盾本盾。", traits: ["仰卧起坐", "摆烂未遂", "口是心非", "间歇性努力"], summary: "压抑+内向+稳定+拖延+理性+谨慎 = 奋斗型咸鱼。你嘴上说着算了，身体却在deadline前爆发出惊人的执行力。" },
            { code: "RELNTC", name: "活体矛盾指南", emoji: "🎲", rarity: "epic", desc: "身上全是矛盾：想社交又怕人，想躺平又焦虑，想恋爱又嫌麻烦。你就是一本行走的纠结教科书。", traits: ["选择困难", "内心战争", "拖延又自责", "纠结之王"], summary: "压抑+外向+敏感+拖延+感性+谨慎 = 矛盾综合体。你的内心永远有两个小人在打架，而你是那个吃瓜的围观群众。" },
            { code: "RELPTC", name: "终极废物逆袭", emoji: "🐛", rarity: "epic", desc: "拖延且压抑，但关键时刻总能爆发小宇宙。你是那种平时像虫，关键时刻化龙的神奇生物。", traits: ["死线奇迹", "逆袭专业户", "隐藏大佬", "深藏不露"], summary: "压抑+外向+稳定+拖延+理性+谨慎 = 沉睡的哥斯拉。平时的你是个懒散小透明，直到危机来临才展现真正的力量。" },
            { code: "OESNT2", name: "快乐沙雕", emoji: "🤪", rarity: "common", desc: "开放外向，感性冲动，快乐至上。你的存在就是为了证明，人类智商的下限可以有多低，快乐就可以有多高。", traits: ["沙雕网友", "快乐病毒", "智商掉线", "气氛组组长"], summary: "开放+外向+敏感+行动派+感性+冒险 = 快乐制造机。你的人生信条是：笑就完了，想那么多干嘛？" },
            { code: "OELPT2", name: "聪明绝顶的懒虫", emoji: "🦥", rarity: "rare", desc: "懒到极致却效率奇高，能用一分钟解决的绝不用两分钟。你的人生智慧是：懒，才是第一生产力。", traits: ["懒人科技", "效率鬼才", "最省力法则", "优雅摸鱼"], summary: "开放+外向+稳定+拖延+理性+谨慎 = 懒惰界的爱因斯坦。你为了能多躺一会，愿意动脑找出最快完成工作的办法。" },
            { code: "RISNTA", name: "斯文败类预备役", emoji: "🎩", rarity: "legendary", desc: "表面文质彬彬，内心暗流涌动。你压抑着破坏欲，随时可能撕破正经面具，吓所有人一跳。", traits: ["衣冠禽兽", "压抑的疯狂", "斯文外表", "内心野兽"], summary: "压抑+内向+敏感+行动派+感性+冒险 = 伪装成绵羊的狼。你彬彬有礼的外表下，藏着一个随时可能出笼的野兽。" },
            { code: "OILPTC", name: "精致废物点心", emoji: "🍮", rarity: "rare", desc: "内向、拖延、谨慎，却追求生活品质。你是那种连摆烂都要摆得漂漂亮亮的人，废物也要做最精致的那一个。", traits: ["精致穷", "仪式感废物", "美观第一", "拖延美学"], summary: "开放+内向+稳定+拖延+感性+谨慎 = 美学型躺平专家。你连颓废都要保持优雅，是废墟里开出的花。" }
        ];

        const DEFAULT_RARITY_INFO = {
            common: { percent: '32%', text: '每3个人里就有1个你，俗称"烂大街的宝藏"，虽然多但每个都是独一无二的沙雕。' },
            rare: { percent: '12%', text: '班级里的稀有物种，大概一个班能抓出5只。你的存在让小组作业多了几分不确定。' },
            epic: { percent: '3.7%', text: '全公司就你一个这样的，开会时自带BGM的珍兽，建议列入办公室保护名录。' },
            legendary: { percent: '0.01%', text: '真正的万中无一！你就像是煎饼果子里吃出钻石，科学家建议研究你的基因序列。' }
        };

        // ===================== 数据加载（优先从后端获取） =====================
        const STORAGE_KEY = 'hpti_data';
        let appData = null;

        async function loadAppData() {
            // 先尝试从后端获取配置
            try {
                const resp = await fetch(API_BASE + '/api/config');
                if (resp.ok) {
                    const json = await resp.json();
                    if (json.config && json.config.questions && json.config.questions.length > 0) {
                        return {
                            questions: json.config.questions,
                            personalities: json.config.personalities || DEFAULT_PERSONALITY_DB,
                            rarityInfo: json.config.rarityInfo || DEFAULT_RARITY_INFO,
                            testRecords: []
                        };
                    }
                }
            } catch(e) { /* 后端不可用，使用本地数据 */ }

            // 回退到 localStorage
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    const parsed = JSON.parse(stored);
                    if (parsed.questions && parsed.personalities) {
                        return parsed;
                    }
                } catch(e) {}
            }
            // 初始化默认数据
            const data = {
                questions: DEFAULT_QUESTIONS,
                personalities: DEFAULT_PERSONALITY_DB,
                rarityInfo: DEFAULT_RARITY_INFO,
                testRecords: []
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            return data;
        }

        // ===================== 测试记录保存（提交到后端） =====================
        function saveTestRecord(personality, matchPercent, userCode, rarity) {
            // 提交到后端 API
            const payload = {
                userCode: userCode || personality.code,
                personalityCode: personality.code,
                personalityName: personality.name,
                personalityEmoji: personality.emoji,
                matchPercent: matchPercent,
                rarity: rarity || personality.rarity
            };
            fetch(API_BASE + '/api/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(resp => resp.json()).then(json => {
                if (json.success) {
                    const el = document.getElementById('saveStatus');
                    if (el) {
                        el.textContent = '✅ 结果已保存到服务器';
                        el.classList.remove('error');
                        el.classList.add('show');
                        setTimeout(() => el.classList.remove('show'), 3000);
                    }
                }
            }).catch(() => {
                const el = document.getElementById('saveStatus');
                if (el) {
                    el.textContent = '⚠ 结果仅保存在本地（服务器不可用）';
                    el.classList.add('error');
                    el.classList.add('show');
                    setTimeout(() => el.classList.remove('show'), 3000);
                }
            });
        }

        let questions = [];
        let currentQ = 0;
        let answers = new Array(12).fill(null);

        function generateRandomQuestions() {
            const selected = [];
            dimKeys.forEach(dim => {
                const pool = allQuestions.filter(q => q.dim === dim);
                const shuffled = pool.sort(() => Math.random() - 0.5);
                selected.push(shuffled[0], shuffled[1]);
            });
            return selected.sort(() => Math.random() - 0.5);
        }

        const personalityMap = new Map();
        const rarityNames = { common: "常见", rare: "稀有", epic: "史诗", legendary: "传说" };
        let allQuestions = DEFAULT_QUESTIONS;
        let personalityDB = DEFAULT_PERSONALITY_DB;
        let rarityInfo = DEFAULT_RARITY_INFO;

        function computeCodeAndMatch() {
            const scores = { sex: 0, social: 0, emotion: 0, action: 0, think: 0, adventure: 0 };
            questions.forEach((q, idx) => {
                const ans = answers[idx];
                if (ans && scoreMap[ans] !== undefined) {
                    scores[q.dim] += scoreMap[ans];
                }
            });
            let userCode = "";
            dimKeys.forEach(dim => {
                userCode += (scores[dim] > 0) ? dimFirstLetter[dim] : dimSecondLetter[dim];
            });

            let bestPersonality = null;
            let bestDist = Infinity;
            if (personalityMap.has(userCode)) {
                bestPersonality = personalityMap.get(userCode);
                bestDist = 0;
            } else {
                for (let p of personalityDB) {
                    let dist = 0;
                    for (let i = 0; i < 6; i++) {
                        if (userCode[i] !== p.code[i]) dist++;
                    }
                    if (dist < bestDist) { bestDist = dist; bestPersonality = p; }
                }
            }

            const matchPercent = Math.round(((6 - bestDist) / 6) * 100);
            const dimHits = {};
            dimKeys.forEach((dim, i) => {
                dimHits[dim] = (userCode[i] === bestPersonality.code[i]);
            });

            return { userCode, bestPersonality, matchPercent, dimHits, bestDist, scores };
        }

        const qContainer = document.getElementById('questionContainer');
        const prevBtn = document.getElementById('prevBtn');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const resultContainer = document.getElementById('resultContainer');

        function renderQuestion() {
            if (currentQ >= questions.length) return;
            const q = questions[currentQ];
            const selected = answers[currentQ];
            const optKeys = ['A', 'B', 'C', 'D', 'E'];
            const optValues = [q.optA, q.optB, q.optC, q.optD, q.optE];

            let optionsHTML = '';
            optKeys.forEach((key, i) => {
                const isMid = (key === 'C');
                const isSel = (selected === key);
                optionsHTML += `
            <div class="opt-btn${isMid ? ' opt-mid' : ''}${isSel ? ' selected' : ''}" onclick="selectAnswer('${key}')">
              <span class="opt-letter">${key}</span>
              <span class="opt-text">${optValues[i]}</span>
              <span class="opt-intensity">${intensityLabels[i]}</span>
            </div>`;
            });

            qContainer.innerHTML = `
          <div class="question-card">
            <div class="q-text">${currentQ+1}. ${q.text}</div>
            <div class="options">${optionsHTML}</div>
          </div>`;
            updateNavButtons();
            updateProgress();
        }

        function selectAnswer(choice) {
            answers[currentQ] = choice;
            renderQuestion();
            setTimeout(() => {
                if (currentQ === questions.length - 1) {
                    calcResult();
                } else {
                    if (currentQ < questions.length - 1 && answers[currentQ] !== null) {
                        currentQ++;
                        renderQuestion();
                    }
                }
            }, 300);
        }

        function updateNavButtons() {
            prevBtn.style.display = currentQ > 0 ? 'inline-block' : 'none';
        }

        function updateProgress() {
            const answered = answers.filter(a => a !== null).length;
            const pct = Math.round((answered / questions.length) * 100);
            progressFill.style.width = pct + '%';
            progressText.textContent = `第 ${currentQ+1}/${questions.length} 题`;
        }

        function prevQuestion() {
            if (currentQ > 0) {
                currentQ--;
                renderQuestion();
            }
        }

        function calcResult() {
            if (answers.includes(null)) return;
            const { userCode, bestPersonality, matchPercent, dimHits, bestDist } = computeCodeAndMatch();
            const personality = bestPersonality;
            const isPerfect = matchPercent === 100;
            const rarity = personality.rarity;
            const rarityName = rarityNames[rarity];
            const rarityClass = 'rarity-' + rarity;
            const rarityData = rarityInfo[rarity] || { percent: '?', text: '' };

            // 保存测试记录到后端
            saveTestRecord(personality, matchPercent, userCode, rarity);

            qContainer.innerHTML = '';
            document.getElementById('navButtons').style.display = 'none';
            document.querySelector('.progress-wrap').style.display = 'none';
            resultContainer.style.display = 'block';

            const dimOrder = ["sex", "social", "emotion", "action", "think", "adventure"];
            const dimDotHTML = dimOrder.map(dim => {
                const hit = dimHits[dim];
                const letter = personality.code[dimOrder.indexOf(dim)];
                return `<span class="dim-dot ${hit ? 'hit' : 'miss'}" title="${dimLabels[dim].first} / ${dimLabels[dim].second}">${letter}</span>`;
            }).join('');

            const hitCount = 6 - bestDist;
            const matchEmoji = isPerfect ? '🎯' : (matchPercent >= 83 ? '👍' : (matchPercent >= 67 ? '🤔' : '🔍'));

            resultContainer.innerHTML = `
          <div class="result-badge">
            <div class="result-emoji">${personality.emoji}</div>
            <div class="result-code">${personality.code}</div>
            <div class="result-name">${personality.name}</div>
            <span class="rarity-badge ${rarityClass}">${rarityName}</span>
            <div class="rarity-desc-box">
              🎲 人群中仅占 <strong>${rarityData.percent}</strong> —— ${rarityData.text}
            </div>
          </div>
          <div class="match-section">
            <div class="match-label">${matchEmoji} 命中匹配度</div>
            <div class="match-percent${isPerfect ? ' perfect' : ''}">${matchPercent}%</div>
            <div class="match-bar-outer">
              <div class="match-bar-inner${isPerfect ? ' perfect' : ''}" style="width:${matchPercent}%;"></div>
            </div>
            <div class="match-detail">
              6个维度命中 <span>${hitCount}/6</span>${isPerfect ? ' · 完美命中！你就是这个剧本的主角' : (bestDist === 1 ? ' · 仅1个维度略有偏差，但已足够精准' : ' · ' + bestDist + '个维度存在差异，但这就是真实的你')}
            </div>
            <div class="dim-match-row">${dimDotHTML}</div>
            <div style="font-size:10px;color:#6e5c78;margin-top:6px;letter-spacing:1px;">
              ${dimOrder.map(dim => dimLabels[dim].first + '/' + dimLabels[dim].second).join(' · ')}
            </div>
          </div>
          <div class="result-desc">${personality.desc}</div>
          <div class="result-summary">💡 <strong>性格核心解析：</strong>${personality.summary}</div>
          <div class="result-traits">
            ${personality.traits.map(t => `<span class="trait-tag">${t}</span>`).join('')}
          </div>
          <div class="share-box">
            <p style="color:#bcacc4; margin-bottom:8px;">📤 分享你的HPTI人格</p>
            <textarea class="share-text" id="shareText" readonly rows="5">🔮 我的HPTI人格：${personality.code} 「${personality.name}」${personality.emoji}
        稀有度：${rarityName}（前 ${rarityData.percent}） | 命中匹配度：${matchPercent}%（${hitCount}/6维度命中）
        ${personality.desc}
        来测测你的HPTI隐秘人格类型！</textarea>
            <button class="copy-btn" onclick="copyShare()">📋 复制文案</button>
          </div>
          <div style="text-align:center; margin-top:24px;">
            <button class="btn btn-primary" onclick="restartTest()">🔄 重新测试（换一批题）</button>
          </div>`;
            resultContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function copyShare() {
            const ta = document.getElementById('shareText');
            if (ta) {
                ta.select();
                ta.setSelectionRange(0, 99999);
                navigator.clipboard.writeText(ta.value).then(() => {
                    const toast = document.getElementById('toast');
                    toast.classList.add('show');
                    setTimeout(() => toast.classList.remove('show'), 2000);
                }).catch(() => {
                    document.execCommand('copy');
                    const toast = document.getElementById('toast');
                    toast.classList.add('show');
                    setTimeout(() => toast.classList.remove('show'), 2000);
                });
            }
        }

        function restartTest() {
            questions = generateRandomQuestions();
            answers = new Array(12).fill(null);
            currentQ = 0;
            resultContainer.style.display = 'none';
            resultContainer.innerHTML = '';
            document.getElementById('navButtons').style.display = 'flex';
            document.querySelector('.progress-wrap').style.display = 'block';
            renderQuestion();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        questions = generateRandomQuestions();
        renderQuestion();

        // 异步加载后端数据
        (async () => {
            appData = await loadAppData();
            allQuestions = appData.questions;
            personalityDB = appData.personalities;
            rarityInfo = appData.rarityInfo || DEFAULT_RARITY_INFO;
            // 重建 personalityMap
            personalityDB.forEach(p => personalityMap.set(p.code, p));
            // 重新生成题目（使用后端数据）
            questions = generateRandomQuestions();
            renderQuestion();
            // 隐藏加载动画
            document.getElementById('loadingScreen').classList.add('hide');
            document.getElementById('app').style.visibility = 'visible';
            setTimeout(() => {
                const ls = document.getElementById('loadingScreen');
                if (ls) ls.remove();
            }, 500);
        })();
    </script>
</body>
</html>
