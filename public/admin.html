<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HPTI 后台管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1e1a29;
            background-image: radial-gradient(circle at 20% 10%, #332b40 0%, transparent 35%),
                radial-gradient(circle at 80% 90%, #2d2740 0%, transparent 40%);
            min-height: 100vh;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
            color: #e8e0f0;
            padding: 16px;
        }
        /* ===== Login ===== */
        .login-wrap {
            display: flex; align-items: center; justify-content: center;
            min-height: 90vh;
        }
        .login-box {
            background: rgba(30,25,40,0.85);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            padding: 40px 32px;
            max-width: 380px; width: 100%;
            text-align: center;
            border: 1px solid rgba(255,210,130,0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .login-box .emoji { font-size: 48px; margin-bottom: 8px; }
        .login-box h1 {
            font-size: 22px; font-weight: 700; margin-bottom: 4px;
            background: linear-gradient(135deg, #f9d390, #e6a4b4);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .login-box .sub { color: #9b8eaa; font-size: 13px; margin-bottom: 24px; }
        .login-box input {
            width: 100%; padding: 12px 16px; border-radius: 14px;
            background: rgba(60,45,75,0.8); border: 1.5px solid rgba(190,150,130,0.5);
            color: #e3d7f0; font-size: 15px; outline: none; margin-bottom: 12px;
            transition: border-color .2s;
        }
        .login-box input:focus { border-color: #dba05a; }
        .login-box .btn { width: 100%; }

        /* ===== Buttons ===== */
        .btn {
            padding: 10px 24px; border-radius: 24px; font-weight: 600; font-size: 14px;
            cursor: pointer; border: none; transition: all .2s; letter-spacing: .5px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-primary { background: #dba05a; color: #1e1826; box-shadow: 0 4px 16px rgba(230,160,70,0.4); }
        .btn-primary:hover { background: #e6b46c; transform: translateY(-1px); }
        .btn-danger { background: #c75c5c; color: #fff; }
        .btn-danger:hover { background: #d97070; }
        .btn-outline { background: transparent; border: 1.5px solid #6e5c78; color: #ddd; }
        .btn-outline:hover { background: rgba(255,255,255,0.06); border-color: #c9b8d8; }
        .btn-sm { padding: 6px 14px; font-size: 12px; border-radius: 18px; }
        .btn:disabled { opacity: .4; pointer-events: none; }

        /* ===== Admin Main ===== */
        .admin-container { max-width: 1100px; margin: 0 auto; }
        .admin-header {
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 12px; margin-bottom: 20px;
        }
        .admin-title {
            display: flex; align-items: center; gap: 10px;
        }
        .admin-title .emoji { font-size: 32px; filter: drop-shadow(0 0 8px #daa06a); }
        .admin-title h1 {
            font-size: 22px; font-weight: 700;
            background: linear-gradient(135deg, #f9d390, #e6a4b4);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .admin-title .ver { font-size: 11px; color: #6e5c78; }

        .tab-nav {
            display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 20px;
            background: rgba(45,35,55,0.6); border-radius: 16px; padding: 4px;
            border: 1px solid rgba(215,185,140,0.15);
        }
        .tab-btn {
            padding: 10px 18px; border-radius: 12px; font-size: 14px; font-weight: 600;
            cursor: pointer; border: none; background: transparent; color: #9b8eaa;
            transition: all .2s; white-space: nowrap;
        }
        .tab-btn:hover { color: #ddd; background: rgba(255,255,255,0.04); }
        .tab-btn.active {
            background: rgba(219,160,90,0.25); color: #f9d390;
            box-shadow: 0 0 12px rgba(230,170,100,0.2);
        }
        .tab-content { display: none; animation: fadeUp .35s ease; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:translateY(0);} }

        /* ===== Cards ===== */
        .card {
            background: rgba(45,35,55,0.7); border-radius: 18px; padding: 20px;
            border: 1px solid rgba(215,185,140,0.2); margin-bottom: 16px;
        }
        .card-title {
            font-size: 16px; font-weight: 700; color: #f1e5ff; margin-bottom: 14px;
            display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
        }

        /* ===== Dashboard Stats ===== */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(200px,1fr)); gap: 14px; margin-bottom: 20px; }
        .stat-card {
            background: rgba(45,35,55,0.7); border-radius: 16px; padding: 20px;
            border: 1px solid rgba(215,185,140,0.2); text-align: center;
        }
        .stat-card .stat-icon { font-size: 32px; margin-bottom: 6px; }
        .stat-card .stat-num {
            font-size: 36px; font-weight: 800;
            background: linear-gradient(135deg, #f9d390, #e6a4b4);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .stat-card .stat-label { font-size: 13px; color: #9b8eaa; margin-top: 4px; }

        .dim-stats { display: flex; flex-wrap: wrap; gap: 8px; }
        .dim-chip {
            background: rgba(219,160,90,0.15); border: 1px solid rgba(219,160,90,0.3);
            border-radius: 20px; padding: 6px 16px; font-size: 13px; color: #f5d7b0;
        }
        .dim-chip b { color: #f9d390; }

        .rarity-stats { display: flex; flex-wrap: wrap; gap: 8px; }
        .rarity-chip {
            border-radius: 20px; padding: 6px 16px; font-size: 13px; font-weight: 600;
        }
        .rarity-chip.common { background: rgba(176,160,192,0.2); color: #b0a0c0; border:1px solid rgba(176,160,192,0.4); }
        .rarity-chip.rare { background: rgba(126,200,160,0.2); color: #7ec8a0; border:1px solid rgba(126,200,160,0.4); }
        .rarity-chip.epic { background: rgba(201,123,191,0.2); color: #c97bbf; border:1px solid rgba(201,123,191,0.4); }
        .rarity-chip.legendary { background: rgba(255,170,0,0.2); color: #ffaa00; border:1px solid rgba(255,170,0,0.4); }

        /* ===== Table ===== */
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th {
            text-align: left; padding: 10px 12px; font-size: 12px; color: #9b8eaa;
            border-bottom: 1px solid rgba(215,185,140,0.2); text-transform: uppercase; letter-spacing: 1px;
        }
        .data-table td {
            padding: 12px; font-size: 13px; border-bottom: 1px solid rgba(60,45,75,0.5);
            color: #ddd; vertical-align: top;
        }
        .data-table tr:hover td { background: rgba(255,255,255,0.03); }
        .data-table .code-cell { font-weight: 700; color: #f9d390; letter-spacing: 1px; font-family: monospace; }
        .data-table .name-cell { font-weight: 600; color: #f1e5ff; }

        .table-wrap { overflow-x: auto; border-radius: 14px; }

        /* ===== Badges ===== */
        .badge {
            display: inline-block; padding: 3px 10px; border-radius: 12px;
            font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
        }
        .badge-dim-sex { background: rgba(230,160,180,0.2); color: #e6a4b4; border:1px solid rgba(230,160,180,0.3); }
        .badge-dim-social { background: rgba(126,200,160,0.2); color: #7ec8a0; border:1px solid rgba(126,200,160,0.3); }
        .badge-dim-emotion { background: rgba(126,160,230,0.2); color: #7ea0e6; border:1px solid rgba(126,160,230,0.3); }
        .badge-dim-action { background: rgba(230,200,100,0.2); color: #e6c864; border:1px solid rgba(230,200,100,0.3); }
        .badge-dim-think { background: rgba(180,140,230,0.2); color: #b48ce6; border:1px solid rgba(180,140,230,0.3); }
        .badge-dim-adventure { background: rgba(230,130,100,0.2); color: #e68264; border:1px solid rgba(230,130,100,0.3); }

        .badge-common { background: rgba(176,160,192,0.2); color: #b0a0c0; }
        .badge-rare { background: rgba(126,200,160,0.2); color: #7ec8a0; }
        .badge-epic { background: rgba(201,123,191,0.2); color: #c97bbf; }
        .badge-legendary { background: rgba(255,170,0,0.2); color: #ffaa00; }

        /* ===== Filter Bar ===== */
        .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
        .filter-bar select, .filter-bar input {
            padding: 8px 14px; border-radius: 12px; background: rgba(60,45,75,0.8);
            border: 1.5px solid rgba(190,150,130,0.4); color: #ddd; font-size: 13px; outline: none;
        }
        .filter-bar select:focus, .filter-bar input:focus { border-color: #dba05a; }
        .filter-bar .spacer { flex: 1; }

        /* ===== Modal ===== */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            display: none; align-items: flex-start; justify-content: center;
            z-index: 1000; padding: 20px; overflow-y: auto;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: rgba(30,25,40,0.95); border-radius: 24px;
            padding: 28px 24px; max-width: 600px; width: 100%;
            border: 1px solid rgba(255,210,130,0.25);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            animation: fadeUp .3s ease; margin: auto;
        }
        .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .modal-title { font-size: 18px; font-weight: 700; color: #f1e5ff; }
        .modal-close { background: none; border: none; color: #9b8eaa; font-size: 24px; cursor: pointer; padding: 4px 8px; }
        .modal-close:hover { color: #fff; }
        .modal-body { max-height: 65vh; overflow-y: auto; padding-right: 4px; }

        /* ===== Form ===== */
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 13px; color: #bcacc4; margin-bottom: 6px; font-weight: 600; }
        .form-input, .form-textarea, .form-select {
            width: 100%; padding: 10px 14px; border-radius: 12px;
            background: rgba(60,45,75,0.8); border: 1.5px solid rgba(190,150,130,0.4);
            color: #e3d7f0; font-size: 14px; outline: none; transition: border-color .2s;
            font-family: inherit;
        }
        .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: #dba05a; }
        .form-textarea { resize: vertical; min-height: 70px; line-height: 1.5; }
        .form-row { display: flex; gap: 12px; }
        .form-row .form-group { flex: 1; }
        .form-hint { font-size: 11px; color: #6e5c78; margin-top: 4px; }
        .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

        .opt-grid { display: grid; grid-template-columns: auto 1fr; gap: 8px 10px; align-items: center; }
        .opt-letter-tag {
            width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            background: rgba(255,215,150,0.2); color: #f9d390; font-weight: 700; font-size: 12px;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #dba05a; color: #1e1826; padding: 10px 24px;
            border-radius: 30px; font-weight: bold; z-index: 9999;
            opacity: 0; transition: opacity .3s; pointer-events: none;
        }
        .toast.show { opacity: 1; }

        /* ===== Misc ===== */
        .empty-state { text-align: center; padding: 40px 20px; color: #6e5c78; }
        .empty-state .emoji { font-size: 48px; margin-bottom: 8px; display: block; }
        .personality-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr)); gap: 12px; }
        .personality-card {
            background: rgba(45,35,55,0.7); border-radius: 14px; padding: 16px;
            border: 1px solid rgba(215,185,140,0.15); transition: all .2s;
        }
        .personality-card:hover { border-color: rgba(219,160,90,0.4); transform: translateY(-2px); }
        .personality-card .pcode { font-size: 18px; font-weight: 800; color: #f9d390; letter-spacing: 3px; font-family: monospace; }
        .personality-card .pname { font-size: 14px; font-weight: 600; color: #f1e5ff; margin: 4px 0; }
        .personality-card .pemoji { font-size: 24px; }
        .personality-card .pdesc { font-size: 12px; color: #9b8eaa; line-height: 1.5; margin-top: 6px; }
        .personality-card .pactions { display: flex; gap: 6px; margin-top: 10px; }

        .record-row {
            display: flex; align-items: center; gap: 10px; padding: 10px 14px;
            background: rgba(45,35,55,0.5); border-radius: 12px; margin-bottom: 6px;
            border: 1px solid rgba(215,185,140,0.1);
        }
        .record-row .r-emoji { font-size: 20px; }
        .record-row .r-code { font-weight: 700; color: #f9d390; font-family: monospace; letter-spacing: 1px; }
        .record-row .r-name { color: #ddd; font-size: 13px; }
        .record-row .r-percent { margin-left: auto; color: #7ec8a0; font-weight: 700; font-size: 13px; }
        .record-row .r-time { color: #6e5c78; font-size: 11px; }

        .link-btn {
            background: none; border: none; color: #f9d390; cursor: pointer;
            font-size: 13px; text-decoration: underline; padding: 0;
        }
        .link-btn:hover { color: #ffe5c4; }

        .danger-zone {
            border: 1px solid rgba(199,92,92,0.4); border-radius: 16px; padding: 20px;
            background: rgba(199,92,92,0.08); margin-top: 16px;
        }
        .danger-zone h3 { color: #c75c5c; font-size: 15px; margin-bottom: 10px; }

        @media (max-width: 600px) {
            .form-row { flex-direction: column; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .tab-btn { padding: 8px 12px; font-size: 13px; }
        }
    </style>
</head>
<body>
    <!-- ===== Login ===== -->
    <div class="login-wrap" id="loginWrap">
        <div class="login-box">
            <span class="emoji">🔐</span>
            <h1>HPTI 后台管理</h1>
            <div class="sub">请输入管理密码</div>
            <input type="password" id="pwdInput" placeholder="密码（默认 admin）" onkeydown="if(event.key==='Enter')doLogin()">
            <button class="btn btn-primary" onclick="doLogin()">进入后台</button>
            <div style="margin-top:16px;font-size:12px;color:#6e5c78;">默认密码: admin · 数据存储在服务器端</div>
        </div>
    </div>

    <!-- ===== Admin Main ===== -->
    <div class="admin-container" id="adminMain" style="display:none;">
        <div class="admin-header">
            <div class="admin-title">
                <span class="emoji">🔮</span>
                <div>
                    <h1>HPTI 后台管理系统</h1>
                    <span class="ver">隐藏人格类型指标 · 管理面板 v1.0</span>
                </div>
            </div>
            <div style="display:flex;gap:8px;">
                <a href="index.html" target="_blank" class="btn btn-outline btn-sm">🧪 打开测试</a>
                <button class="btn btn-outline btn-sm" onclick="doLogout()">退出</button>
            </div>
        </div>

        <div class="tab-nav">
            <button class="tab-btn active" data-tab="dashboard" onclick="switchTab('dashboard')">📊 数据概览</button>
            <button class="tab-btn" data-tab="questions" onclick="switchTab('questions')">📝 题库管理</button>
            <button class="tab-btn" data-tab="personalities" onclick="switchTab('personalities')">🎭 人格库</button>
            <button class="tab-btn" data-tab="rarity" onclick="switchTab('rarity')">💎 稀有度配置</button>
            <button class="tab-btn" data-tab="records" onclick="switchTab('records')">📋 测试记录</button>
            <button class="tab-btn" data-tab="data" onclick="switchTab('data')">💾 数据管理</button>
        </div>

        <div id="tab-dashboard" class="tab-content"></div>
        <div id="tab-questions" class="tab-content" style="display:none;"></div>
        <div id="tab-personalities" class="tab-content" style="display:none;"></div>
        <div id="tab-rarity" class="tab-content" style="display:none;"></div>
        <div id="tab-records" class="tab-content" style="display:none;"></div>
        <div id="tab-data" class="tab-content" style="display:none;"></div>
    </div>

    <!-- ===== Modal ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">编辑</div>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <div class="toast" id="toast">已保存</div>

    <script>
    // ==================== 后端 API ====================
    const API_BASE = ''; // 同源部署留空
    let adminPwd = ''; // 保存在内存中

    async function apiGet(path) {
        const resp = await fetch(API_BASE + path, { headers: { 'X-Admin-Password': adminPwd } });
        if (resp.status === 401) throw new Error('未授权');
        return resp.json();
    }
    async function apiPost(path, body) {
        const resp = await fetch(API_BASE + path, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-Admin-Password': adminPwd },
            body: JSON.stringify(body)
        });
        if (resp.status === 401) throw new Error('未授权');
        return resp.json();
    }
    async function apiPut(path, body) {
        const resp = await fetch(API_BASE + path, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'X-Admin-Password': adminPwd },
            body: JSON.stringify(body)
        });
        if (resp.status === 401) throw new Error('未授权');
        return resp.json();
    }
    async function apiDelete(path) {
        const resp = await fetch(API_BASE + path, {
            method: 'DELETE',
            headers: { 'X-Admin-Password': adminPwd }
        });
        if (resp.status === 401) throw new Error('未授权');
        return resp.json();
    }

    const dimKeys = ["sex","social","emotion","action","think","adventure"];

        action:{first:"行动派",second:"拖延症",short:"行动派/拖延症"},
        think:{first:"理性",second:"感性",short:"理性/感性"},
        adventure:{first:"冒险",second:"谨慎",short:"冒险/谨慎"}
    };
    const dimFirstLetter = {sex:"O",social:"E",emotion:"S",action:"P",think:"T",adventure:"A"};
    const dimSecondLetter = {sex:"R",social:"I",emotion:"N",action:"L",think:"F",adventure:"C"};
    const rarityNames = {common:"常见",rare:"稀有",epic:"史诗",legendary:"传说"};

    const DEFAULT_QUESTIONS = [

    // ==================== State ====================
    let appData = null;

    let qFilter = 'all';
    let pFilter = 'all';
    let pSearch = '';

    // ==================== Storage (Backend API) ====================
    async function loadData() {
        try {
            const json = await apiGet('/api/config');
            if (json.config && json.config.questions && json.config.questions.length > 0) {
                return {
                    questions: json.config.questions,
                    personalities: json.config.personalities || DEFAULT_PERSONALITIES,
                    rarityInfo: json.config.rarityInfo || DEFAULT_RARITY,
                    testRecords: []
                };
            }
        } catch(e) { /* 后端未配置，使用默认 */ }
        // 初始化默认数据
        const data = {
            questions: JSON.parse(JSON.stringify(DEFAULT_QUESTIONS)),
            personalities: JSON.parse(JSON.stringify(DEFAULT_PERSONALITIES)),
            rarityInfo: JSON.parse(JSON.stringify(DEFAULT_RARITY)),
            testRecords: []
        };
        // 保存默认配置到后端
        try { await apiPut('/api/config', data); } catch(e) {}
        return data;
    }

    async function saveData() {
        try {
            await apiPut('/api/config', {
                questions: appData.questions,
                personalities: appData.personalities,
                rarityInfo: appData.rarityInfo
            });
        } catch(e) { showToast('保存到后端失败', true); }
    }

    async function resetData() {
        appData = {
            questions: JSON.parse(JSON.stringify(DEFAULT_QUESTIONS)),
            personalities: JSON.parse(JSON.stringify(DEFAULT_PERSONALITIES)),
            rarityInfo: JSON.parse(JSON.stringify(DEFAULT_RARITY)),
            testRecords: []
        };
        await saveData();
    }

    // ==================== Login ====================
    async function doLogin() {
        const pwd = document.getElementById('pwdInput').value;
        if (!pwd) { showToast('请输入密码', true); return; }
        try {
            const json = await apiPost('/api/login', { password: pwd });
            if (json.success) {
                adminPwd = pwd;
                document.getElementById('loginWrap').style.display = 'none';
                document.getElementById('adminMain').style.display = 'block';
                appData = await loadData();
                switchTab('dashboard');
                showToast('欢迎回来');
            } else {
                showToast('密码错误', true);
            }
        } catch(e) {
            showToast('无法连接服务器', true);
        }
    }

    function doLogout() {
        adminPwd = '';
        document.getElementById('loginWrap').style.display = 'flex';
        document.getElementById('adminMain').style.display = 'none';
        document.getElementById('pwdInput').value = '';
        appData = null;
    }

    // ==================== Tab Switching ====================
    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
        document.getElementById('tab-' + tab).style.display = 'block';
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
        if (tab === 'dashboard') renderDashboard();
        if (tab === 'questions') renderQuestions();
        if (tab === 'personalities') renderPersonalities();
        if (tab === 'rarity') renderRarity();
        if (tab === 'records') renderRecords();
        if (tab === 'data') renderData();
    }

            optC: document.getElementById('q-c').value.trim(),

        closeModal();
        renderQuestions();
        showToast(idx >= 0 ? '已更新' : '已添加');

    async function savePersonality(idx) {
        const p = {
            code: document.getElementById('p-code').value.trim().toUpperCase(),
            name: document.getElementById('p-name').value.trim(),
            emoji: document.getElementById('p-emoji').value.trim() || '🆕',
            rarity: document.getElementById('p-rarity').value,
            desc: document.getElementById('p-desc').value.trim(),
            summary: document.getElementById('p-summary').value.trim(),
            traits: document.getElementById('p-traits').value.split(',').map(t=>t.trim()).filter(t=>t)
        };
        if (!p.code || !p.name || !p.desc) { showToast('请填写代号、名称和描述', true); return; }
        if (idx >= 0) {
            appData.personalities[idx] = p;
        } else {
            if (appData.personalities.some(x => x.code === p.code)) {
                showToast('代号已存在', true); return;
            }
            appData.personalities.push(p);
        }
        await saveData();
        closeModal();
        renderPersonalities();
        showToast(idx >= 0 ? '已更新' : '已添加');
    }

    async function deletePersonality(idx) {
        if (!confirm(`确认删除人格「${appData.personalities[idx].name}」？`)) return;

    function viewRecordDetail(idx) {
        fetch(API_BASE + '/api/results', { headers: { 'X-Admin-Password': adminPwd } })
            .then(r => r.json())
            .then(json => {
                const results = json.results || [];
                const r = results[idx];
                if (!r) { showToast('记录不存在', true); return; }

                const duration = r.duration ? (r.duration >= 60 ? Math.floor(r.duration/60) + '分' + (r.duration%60) + '秒' : r.duration + '秒') : '-';
                const time = new Date(r.timestamp).toLocaleString('zh-CN');
                const dimKeysLocal = ['sex','social','emotion','action','think','adventure'];
                const dimLabelsLocal = {
                    sex:{first:"性开放",second:"性压抑",short:"性开放/性压抑"},
                    social:{first:"外向",second:"内向",short:"外向/内向"},
                    emotion:{first:"情绪稳定",second:"敏感多虑",short:"情绪稳定/敏感多虑"},
                    action:{first:"行动派",second:"拖延症",short:"行动派/拖延症"},
                    think:{first:"理性",second:"感性",short:"理性/感性"},
                    adventure:{first:"冒险",second:"谨慎",short:"冒险/谨慎"}
                };

                // 答题详情
                let answersHTML = '';
                if (r.answers && r.answers.length > 0) {
                    answersHTML = r.answers.map(a => `
                        <div style="background:rgba(60,45,75,0.5);border-radius:10px;padding:12px;margin-bottom:8px;">
                            <div style="display:flex;gap:8px;align-items:flex-start;">
                                <span style="background:rgba(219,160,90,0.2);color:#f9d390;font-weight:700;font-size:12px;padding:2px 8px;border-radius:8px;flex-shrink:0;">Q${a.questionIndex}</span>
                                <span class="badge badge-dim-${a.dimension}" style="flex-shrink:0;">${dimLabelsLocal[a.dimension]?.short || a.dimension}</span>
                                <div style="flex:1;min-width:0;">
                                    <div style="font-size:13px;color:#ddd;margin-bottom:4px;">${a.questionText}</div>
                                    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;font-size:12px;">
                                        <span style="background:rgba(219,160,90,0.3);color:#f9d390;font-weight:700;padding:2px 10px;border-radius:10px;">选 ${a.selectedAnswer}</span>
                                        <span style="color:#bcacc4;">${a.selectedOption}</span>
                                        <span style="color:#6e5c78;">得分: ${a.score > 0 ? '+' : ''}${a.score}</span>
                                        <span style="color:#6e5c78;">${a.intensity}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    answersHTML = '<div style="color:#6e5c78;font-size:13px;padding:12px;">该记录无详细答题数据（旧版本记录）</div>';
                }

                // 维度得分
                let scoresHTML = '';
                if (r.scores) {
                    scoresHTML = dimKeysLocal.map(dim => {
                        const score = r.scores[dim] || 0;
                        const detail = r.dimDetails && r.dimDetails[dim] ? r.dimDetails[dim] : null;
                        const letter = detail ? detail.letter : (score > 0 ? '?' : '?');
                        const hit = detail ? detail.hit : false;
                        const label = dimLabelsLocal[dim];
                        return `
                            <div style="text-align:center;">
                                <div style="font-size:11px;color:#9b8eaa;margin-bottom:4px;">${label.short}</div>
                                <div style="font-size:20px;font-weight:800;color:${hit ? '#f9d390' : '#6e5c78'};">${letter}</div>
                                <div style="font-size:12px;color:${score > 0 ? '#7ec8a0' : '#c75c5c'};">${score > 0 ? '+' : ''}${score}</div>
                            </div>
                        `;
                    }).join('');
                }

                // 设备信息
                let deviceHTML = '';
                if (r.deviceInfo) {
                    const di = r.deviceInfo;
                    deviceHTML = `
                        <div style="background:rgba(60,45,75,0.5);border-radius:10px;padding:12px;font-size:12px;color:#9b8eaa;line-height:1.8;">
                            <div><b style="color:#bcacc4;">UA:</b> ${di.userAgent || '-'}</div>
                            <div><b style="color:#bcacc4;">平台:</b> ${di.platform || '-'} | <b style="color:#bcacc4;">语言:</b> ${di.language || '-'}</div>
                            <div><b style="color:#bcacc4;">屏幕:</b> ${di.screen || '-'} | <b style="color:#bcacc4;">视口:</b> ${di.viewport || '-'}</div>
                            <div><b style="color:#bcacc4;">来源:</b> ${di.referrer || '直接访问'}</div>
                        </div>
                    `;
                }

                openModal('📊 测试记录详情', `
                    <div style="text-align:center;margin-bottom:20px;">
                        <div style="font-size:48px;">${r.personalityEmoji||'🎭'}</div>
                        <div style="font-size:28px;font-weight:800;color:#f9d390;letter-spacing:4px;font-family:monospace;">${r.personalityCode}</div>
                        <div style="font-size:16px;color:#f1e5ff;font-weight:600;">${r.personalityName}</div>
                        <div style="margin-top:8px;">
                            <span class="badge badge-${r.rarity||'common'}">${rarityNames[r.rarity]||'-'}</span>
                            <span style="margin-left:8px;color:#7ec8a0;font-weight:700;">匹配度 ${r.matchPercent}%</span>
                        </div>
                    </div>

                    <div style="background:rgba(60,45,75,0.5);border-radius:12px;padding:14px;margin-bottom:16px;">
                        <div style="display:flex;justify-content:space-around;flex-wrap:wrap;gap:10px;font-size:13px;">
                            <div><span style="color:#9b8eaa;">用户代号:</span> <b style="color:#f9d390;font-family:monospace;">${r.userCode||'-'}</b></div>
                            <div><span style="color:#9b8eaa;">维度偏差:</span> <b style="color:#f9d390;">${r.bestDist !== null ? r.bestDist : '-'}</b></div>
                            <div><span style="color:#9b8eaa;">耗时:</span> <b style="color:#f9d390;">${duration}</b></div>
                            <div><span style="color:#9b8eaa;">题数:</span> <b style="color:#f9d390;">${r.questionCount || '-'}</b></div>
                            <div><span style="color:#9b8eaa;">时间:</span> <b style="color:#f9d390;">${time}</b></div>
                        </div>
                    </div>

                    ${scoresHTML ? `
                    <div style="margin-bottom:16px;">
                        <div style="font-size:14px;font-weight:700;color:#f1e5ff;margin-bottom:10px;">📐 六维度得分</div>
                        <div style="display:flex;justify-content:space-around;flex-wrap:wrap;gap:10px;background:rgba(60,45,75,0.3);border-radius:12px;padding:14px;">
                            ${scoresHTML}
                        </div>
                    </div>` : ''}

                    <div style="margin-bottom:16px;">
                        <div style="font-size:14px;font-weight:700;color:#f1e5ff;margin-bottom:10px;">📝 答题详情（${r.answers ? r.answers.length : 0}题）</div>
                        ${answersHTML}
                    </div>

                    ${deviceHTML ? `
                    <div style="margin-bottom:16px;">
                        <div style="font-size:14px;font-weight:700;color:#f1e5ff;margin-bottom:10px;">📱 设备信息</div>
                        ${deviceHTML}
                    </div>` : ''}

                    <div class="form-actions">
                        <button class="btn btn-outline" onclick="closeModal()">关闭</button>
                    </div>
                `);
            })
            .catch(e => { showToast('加载详情失败', true); });
    }

            </div>

            <div class="danger-zone">
                <h3>⚠️ 危险操作区</h3>
                <div class="form-hint" style="margin-bottom:12px;">以下操作将重置服务器端数据，不可恢复，请谨慎执行。</div>
                <div style="display:flex;gap:10px;flex-wrap:wrap;">
                    <button class="btn btn-danger" onclick="resetQuestions()">重置题库为默认</button>
                    <button class="btn btn-danger" onclick="resetPersonalities()">重置人格库为默认</button>
                    <button class="btn btn-danger" onclick="resetAll()">⚡ 全部重置</button>
                </div>
            </div>
        `;
    }

    async function exportData() {
        try {
            const data = await apiGet('/api/export');
            const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `hpti-backup-${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('已导出');
        } catch(e) { showToast('导出失败', true); }
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async e => {
            try {
                const data = JSON.parse(e.target.result);
                if (!data.questions && !data.results) throw new Error('invalid');
                if (!confirm(`确认导入？\n这将覆盖服务器上的当前数据。`)) return;
                await apiPost('/api/import', data);
                appData = await loadData();
                renderData();
                showToast('导入成功');
            } catch(err) {
                showToast('文件格式错误或导入失败', true);
            }
        };
        reader.readAsText(file);
    }

    async function changePwd() {
        const p1 = document.getElementById('newPwd').value;
        const p2 = document.getElementById('newPwd2').value;
        if (!p1) { showToast('请输入密码', true); return; }
        if (p1 !== p2) { showToast('两次密码不一致', true); return; }
        try {
            await apiPost('/api/password', { newPassword: p1 });
            adminPwd = p1;
            document.getElementById('newPwd').value = '';
            document.getElementById('newPwd2').value = '';
            showToast('密码已修改');
        } catch(e) { showToast('修改失败', true); }
    }

    async function resetQuestions() {
        if (!confirm('确认将题库重置为默认？所有自定义题目将丢失。')) return;
        appData.questions = JSON.parse(JSON.stringify(DEFAULT_QUESTIONS));
        await saveData();
        showToast('题库已重置');
    }

    async function resetPersonalities() {
        if (!confirm('确认将人格库重置为默认？所有自定义人格将丢失。')) return;
        appData.personalities = JSON.parse(JSON.stringify(DEFAULT_PERSONALITIES));
        await saveData();
        showToast('人格库已重置');
    }

    async function resetAll() {
        if (!confirm('⚠️ 确认全部重置？\n\n所有题目、人格、稀有度都将恢复为默认值，此操作不可恢复！')) return;
        await resetData();
        renderData();
        showToast('全部重置完成');
    }

    // ==================== Modal ====================
    function openModal(title, content) {
        document.getElementById('modalTitle').textContent = title;
        document.getElementById('modalBody').innerHTML = content;
        document.getElementById('modalOverlay').classList.add('show');
    }

    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('show');
    }

    document.getElementById('modalOverlay').addEventListener('click', e => {
        if (e.target.id === 'modalOverlay') closeModal();
    });

    // ==================== Toast ====================
    let toastTimer = null;
    function showToast(msg, isError) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.background = isError ? '#c75c5c' : '#dba05a';
        toast.style.color = isError ? '#fff' : '#1e1826';
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // ==================== Init ====================
    // Show login screen
    (function init() {
        // Focus password input
        document.getElementById('pwdInput').focus();
    })();
    </script>
</body>
</html>
